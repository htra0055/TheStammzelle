<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TheStammzelle - Molecular Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

    <script src="./js/Constants.js"></script>
    <script src="./js/Forces.js"></script>
    <script src="./js/Particle.js"></script>
    <script src="./js/SignalSources.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1c1c2a;
        }

<body>
    <div id="controls"
        style="position: fixed; top: 12px; left: 12px; z-index: 20; display: flex; gap: 8px; padding: 8px 10px; border-radius: 8px; background: rgba(12, 18, 34, 0.72); backdrop-filter: blur(4px);">
        <button id="pauseButton" type="button"
            style="padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer;">Pause</button>
        <button id="resetButton" type="button"
            style="padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer;">Reset</button>
    </div>
</body>

</html>
